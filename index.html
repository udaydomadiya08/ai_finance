<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaVision - NFS Prototype</title>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <div class="loader-content">
            <h1>NFS MOST WANTED</h1>
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <p id="loading-status">TIP: Drifting with SPACE refills Nitro faster.</p>
        </div>
    </div>

    <div id="notifications-container"></div>
    <div id="speed-blur-overlay"></div>

    <div id="ui-overlay">
        <div id="top-left-stats">
            <div id="bounty-display">BOUNTY: <span id="total-bounty">0</span></div>
            <div id="cash-display">CASH: $<span id="cash-value">5000</span></div>
            <div id="settings-hint" style="font-size: 0.7rem; opacity: 0.5; margin-top: 1rem;">[ESC] SETTINGS | [U] UPGRADES | [B] BLACKLIST</div>
        </div>

        <div id="pursuit-container">
            <div id="heat-level">HEAT: 1.0</div>
            <div id="pursuit-status" class="idle">IDLE</div>
        </div>

        <div id="speedometer">
            <div class="speed-value" id="speed-value">0</div>
            <div class="speed-unit">KM/H</div>
            <div class="gear-indicator" id="gear-indicator">1</div>
            <div id="nitro-container">
                <div id="nitro-bar"></div>
            </div>
        </div>
    </div>

    <!-- Blacklist Screen -->
    <div id="blacklist-screen">
        <div class="blacklist-header">
            <button id="close-blacklist">✖</button>
            <h1>THE BLACKLIST</h1>
        </div>
        <div id="blacklist-list"></div>
    </div>

    <div id="start-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1001; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center;">
        <h2 style="font-style: italic; color: #ff8c00; margin-bottom: 2rem;">READY TO RACE?</h2>
        <button id="start-button" style="background: #ff8c00; color: black; border: none; padding: 1.5rem 4rem; font-size: 1.5rem; font-weight: 900; cursor: pointer; transform: skew(-10deg);">START ENGINE</button>
    </div>

    <div id="container"></div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
